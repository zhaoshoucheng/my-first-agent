# 智能体配置文件

# LLM 配置
llm:
  provider: "openai"  # openai, anthropic, azure
  model: "gpt-4"
  temperature: 0.7
  max_tokens: 2000

# 智能体配置
agent:
  max_iterations: 10
  verbose: true
  type: "react"  # react, zero-shot, plan-and-execute

# 记忆配置
memory:
  type: "buffer"  # buffer, summary, vector
  max_size: 10    # 对于 buffer 类型，保存最近的 N 条消息

# 工具配置
tools:
  enabled:
    - calculator
    - search

  search:
    provider: "google"  # google, bing
    max_results: 5

# 日志配置
logging:
  level: "info"  # debug, info, warn, error
  format: "json"  # json, text
