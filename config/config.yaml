# 智能体配置文件
#
# 各模块独立解析自己的顶层段；不要在一个模块的段里嵌套另一个模块的配置，
# 这样可以保证模块之间在配置层也没有耦合。

# 账号配置 — 由 domain/account 模块读取
account:
  source:
    type: file              # file | db
    file:
      dir: ./config/accounts
    db:
      driver: ""
      dsn: ""
      table: ""
      username: ""
      password: ""

# LLM 配置 — 由 domain/llm 模块读取
# 目前没有必填字段，未来会加默认温度、超时、重试策略等
llm: {}

# 智能体配置
agent:
  max_iterations: 10
  verbose: true
  type: "react"  # react, zero-shot, plan-and-execute

# 记忆配置
memory:
  type: "buffer"  # buffer, summary, vector
  max_size: 10    # 对于 buffer 类型，保存最近的 N 条消息

# 工具配置
tools:
  enabled:
    - calculator
    - search

  search:
    provider: "google"  # google, bing
    max_results: 5

# 日志配置
logging:
  level: "info"  # debug, info, warn, error
  format: "json"  # json, text
